include = [
    "check_links.py",
    "tests/test_check_links.py",
    "revert_link_deletions.py",
    "tests/test_revert_link_deletions.py",
]

line-length = 100
target-version = "py311"

[lint]
select = [
    "E", "W",   # pycodestyle
    "F",        # pyflakes (unused imports, undefined names)
    "I",        # isort (import ordering)
    "UP",       # pyupgrade (modernise syntax)
    "B",        # flake8-bugbear (likely bugs)
    "SIM",      # flake8-simplify
]
ignore = [
    "E501",     # line-too-long — ruff format handles code; string literals are judgement
]
