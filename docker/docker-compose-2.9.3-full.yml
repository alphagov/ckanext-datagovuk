version: "3"

services:
  opensearch-2.9.3:
    container_name: opensearch-2.9.3
    image: opensearchproject/opensearch
    environment:
      - bootstrap.memory_lock=true # along with the memlock settings below, disables swapping
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m" # minimum and maximum Java heap size, recommend setting both to 50% of system RAM
      - "DISABLE_INSTALL_DEMO_CONFIG=true" # disables execution of install_demo_configuration.sh bundled with security plugin, which installs demo certificates and security configurations to OpenSearch
      - "DISABLE_SECURITY_PLUGIN=true" # disables security plugin entirely in OpenSearch by setting plugins.security.disabled: true in opensearch.yml
      - "discovery.type=single-node"
    volumes:
      - os_data-2.9.3:/usr/share/opensearch/data
    ports:
      - 9202:9200
      - 9602:9600
    networks:
      - ckan-2.9.3

  publish-2.9.3:
    image: govuk/publish:latest
    container_name: publish-2.9.3
    build:
      context: ./src/2.9.3/datagovuk_publish/
    env_file:
      - .env-2.9.3
    links:
      - db-2.9.3:db
      - opensearch-2.9.3:elasticsearch
      - redis-2.9.3:redis
      - ckan-2.9.3:ckan
    depends_on: 
      - db-2.9.3
      - opensearch-2.9.3
      - redis-2.9.3
    command: bash -c "./bin/setup-docker.sh"
    # command: bash -c "tail -f /dev/null"
    volumes:
      - ./src/2.9.3/datagovuk_publish:/srv/app/datagovuk_publish
      - ./logs/2.9.3:/var/log/sidekiq
    networks:
      - ckan-2.9.3

  find-2.9.3:
    image: govuk/find:latest
    container_name: find-2.9.3
    build:  
      context: ./src/2.9.3/datagovuk_find/
    env_file:
      - .env-2.9.3
    links:
      - opensearch-2.9.3:elasticsearch
    depends_on: 
      - opensearch-2.9.3
    # command: bash -c "bin/yarn && ./bin/setup-docker.sh"
    command: bash -c "tail -f /dev/null"
    # command: bash -c "bin/yarn && ./bin/setup-docker-test.sh && tail -f /dev/null"
    volumes:
      - ./src/2.9.3/datagovuk_find:/srv/app/datagovuk_find
      - ./logs/2.9.3:/var/log/find
    networks:
      - ckan-2.9.3
    ports:
      - "4002:3000"

volumes:
  os_data-2.9.3:

networks:
    ckan-2.9.3:
        driver: bridge
