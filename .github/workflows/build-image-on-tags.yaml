name: Build and push images on tags

on:
  workflow_dispatch:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  check_github_ref:
    name: check github
    runs-on: ubuntu-latest
    steps:
      - name: Calculate Image Tags
        run: |
          echo "GH_REF=`echo $(git fetch -t -q && git tag | sort --version-sort | tail -n1)`" >> $GITHUB_ENV
          echo "$GH_REF"
